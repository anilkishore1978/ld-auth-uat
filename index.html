<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=signin.html">
  <title>LIBERTY Dental Plan's Member Portal</title>
  <link rel="icon" href="https://memberportal-blob.libertydentalplan.com/favicon.ico">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f4f6f9;
    }
    .box {
      text-align: center;
      padding: 40px 32px;
    }
    .box img {
      max-width: 220px;
      margin-bottom: 24px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #dee2e6;
      border-top-color: #0a6ab5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #6c757d; font-size: 15px; margin: 0; }
    a { color: #0a6ab5; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <img src="https://memberportal-blob.libertydentalplan.com/C-Stacked-Horizontal.svg"
         alt="LIBERTY Dental Plan">
    <div class="spinner"></div>
    <p>Redirecting to Member Portal&hellip;</p>
    <p style="margin-top:12px;">
      <a href="signin.html">Click here if you are not redirected automatically</a>
    </p>
  </div>

  <script>
    // JavaScript redirect as backup (works even if meta refresh is blocked)
    window.location.replace('signin.html');
  </script>
</body>
</html>
