<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIBERTY Dental Plan Member Portal</title>
  <style>
    body { margin:0; background:#edf1f8; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Roboto,sans-serif; }
    .loader { text-align:center; color:#3352a3; }
    .spinner { width:36px; height:36px; border:4px solid rgba(51,82,163,.2); border-top-color:#3352a3; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <script src="./ld-config.js"></script>
  <script src="./ld-native-auth.js"></script>
  <script>
    /**
     * index.html — Entry point / auth guard only.
     * - Authenticated  → dashboard.html
     * - Not authenticated → signin.html
     * All actual UI lives in the other pages.
     */
    (function () {
      if (LDToken.isAuthenticated()) {
        location.replace('dashboard.html');
      } else {
        location.replace('signin.html');
      }
    })();
  </script>
</body>
</html>
