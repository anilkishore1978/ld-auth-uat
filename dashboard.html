<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LIBERTY Dental Plan Member Portal - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}html{font-size:16px}body{font-family:Roboto,sans-serif;background:#edf1f8;min-height:100vh;color:#1a2340;display:flex;flex-direction:column}
a{color:#3352a3;text-decoration:none}a:hover{text-decoration:underline}
/* Topbar */
.topbar{background:#3352a3;color:#fff;padding:5px 0}.tb-in{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:flex-end;gap:12px;font-size:13px}
.tb-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;border-radius:3px;width:24px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px}
/* Header */
.site-header{background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.09);position:sticky;top:0;z-index:10}
.nav-in{max-width:1280px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}.logo-img{height:48px;display:block}
.nav-right{display:flex;align-items:center;gap:10px}
.btn-emg{background:none;border:2px solid #3352a3;color:#3352a3;border-radius:4px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer}
.btn-signout{background:#3352a3;color:#fff;border:none;border-radius:4px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-signout:hover{background:#243d8a}
/* Welcome banner */
.welcome-banner{background:linear-gradient(135deg,#3352a3 0%,#602D86 100%);color:#fff;padding:32px 20px}
.wb-in{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.wb-left h2{font-family:Nunito,sans-serif;font-size:clamp(22px,3vw,34px);font-weight:900;margin-bottom:6px}
.wb-left p{font-size:14px;opacity:.85}
.member-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:12px 18px;font-size:13px;line-height:1.7;min-width:200px}
.member-badge strong{display:block;font-size:15px;margin-bottom:2px}
/* Main content */
.main-content{max-width:1280px;margin:0 auto;padding:32px 20px 60px;flex:1}
.section-title{font-family:Nunito,sans-serif;font-size:20px;font-weight:800;color:#1a2340;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.section-title i{color:#3352a3}
/* Quick actions grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;margin-bottom:36px}
.dash-card{background:#fff;border-radius:10px;box-shadow:0 2px 14px rgba(51,82,163,.09);padding:24px 20px;display:flex;flex-direction:column;align-items:flex-start;gap:12px;cursor:pointer;transition:box-shadow .2s,transform .15s;border:1px solid transparent}
.dash-card:hover{box-shadow:0 6px 24px rgba(51,82,163,.18);transform:translateY(-2px);border-color:#d8e2f8}
.dash-card .card-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.dash-card h3{font-size:15px;font-weight:700;color:#1a2340}
.dash-card p{font-size:13px;color:#6b7280;line-height:1.5}
.ic-blue{background:#eff4ff;color:#3352a3}
.ic-purple{background:#f5f0ff;color:#602D86}
.ic-green{background:#f0fdf4;color:#166534}
.ic-amber{background:#fffbeb;color:#92400e}
/* Profile section */
.profile-card{background:#fff;border-radius:10px;box-shadow:0 2px 14px rgba(51,82,163,.09);padding:24px;margin-bottom:24px}
.profile-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.profile-field label{display:block;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.profile-field span{font-size:14px;color:#1a2340;font-weight:500}
/* Notice */
.notice{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px 16px;font-size:13px;color:#1e40af;line-height:1.6;display:flex;align-items:flex-start;gap:10px;margin-bottom:24px}
.notice i{margin-top:1px;flex-shrink:0}
/* Footer */
.footer{background:#1a2849;color:#8895b5}.fi{max-width:1280px;margin:0 auto;padding:28px 20px;font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
/* Auth guard screen */
.guard-screen{display:flex;align-items:center;justify-content:center;flex:1}
.guard-box{text-align:center;padding:40px;background:#fff;border-radius:12px;box-shadow:0 4px 28px rgba(51,82,163,.12)}
.guard-box i{font-size:40px;color:#3352a3;margin-bottom:16px}
.guard-box h3{font-family:Nunito,sans-serif;font-size:22px;font-weight:800;margin-bottom:10px}
.guard-box p{color:#6b7280;font-size:14px;margin-bottom:20px}
.btn-goto{background:#3352a3;color:#fff;border:none;border-radius:4px;padding:11px 24px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:36px;height:36px;border:4px solid rgba(51,82,163,.2);border-top-color:#3352a3;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){.profile-row{grid-template-columns:1fr 1fr}}
</style>
</head><body>

<div class="topbar"><div class="tb-in"><span style="opacity:.8">Text Size</span>
<button class="tb-btn" onclick="changeFont(-1)">-</button>
<button class="tb-btn" onclick="changeFont(0)">&#8635;</button>
<button class="tb-btn" onclick="changeFont(1)">+</button>
</div></div>

<header class="site-header"><div class="nav-in">
  <a href="dashboard.html"><img class="logo-img" src="https://memberportal-blob.libertydentalplan.com/C-Stacked-Horizontal.svg" alt="LIBERTY Dental Plan"></a>
  <div class="nav-right">
    <button class="btn-emg" onclick="window.open('https://www.teledentistry.com/insurance/liberty','_blank','noopener')">
      <i class="fa-solid fa-tooth"></i> Dental Emergency
    </button>
    <button class="btn-signout" id="signOutBtn" onclick="doSignOut()">
      <i class="fa-solid fa-right-from-bracket"></i> Sign Out
    </button>
  </div>
</div></header>

<!-- Auth-guard placeholder — replaced by JS once session is verified -->
<div id="pageContent">
  <div class="spinner-wrap"><div class="spinner"></div></div>
</div>

<footer class="footer"><div class="fi">
  <span>© LIBERTY Dental Plan. All rights reserved.</span>
  <span>My Compass Member Portal</span>
</div></footer>

<script src="./ld-config.js"></script>
<script src="./ld-native-auth.js"></script>
<script>function changeFont(d){const r=document.documentElement,c=parseFloat(getComputedStyle(r).fontSize)||16;r.style.fontSize=d===0?'16px':Math.min(20,Math.max(14,c+d))+'px';}</script>
<script>
/* ── Auth guard ──────────────────────────────────────────────── */
(function(){
  const sess=LDToken.get();
  if(!sess||!sess.idToken){
    document.getElementById('pageContent').innerHTML=`
      <div class="guard-screen">
        <div class="guard-box">
          <i class="fa-solid fa-lock"></i>
          <h3>Session Expired</h3>
          <p>Please sign in to access the member portal.</p>
          <button class="btn-goto" onclick="location.href='signin.html'">
            <i class="fa-solid fa-right-to-bracket"></i> Go to Sign In
          </button>
        </div>
      </div>`;
    return;
  }

  /* ── Build dashboard ──────────────────────────────────────── */
  const claims=sess.claims||{};
  const displayName=claims.name||claims.displayName||(claims.given_name?claims.given_name+' '+(claims.family_name||''):'').trim()||'Member';
  const email=claims.email||claims.preferred_username||claims.upn||'—';
  const givenName=claims.given_name||displayName.split(' ')[0]||'Member';
  const memberId=claims.sub||claims.oid||'—';

  document.getElementById('pageContent').innerHTML=`
    <!-- Welcome banner -->
    <div class="welcome-banner">
      <div class="wb-in">
        <div class="wb-left">
          <h2>Hello, ${escHtml(givenName)}!</h2>
          <p>Welcome back to My Compass — your dental benefits hub.</p>
        </div>
        <div class="member-badge">
          <strong>${escHtml(displayName)}</strong>
          <span>${escHtml(email)}</span><br>
          <span style="opacity:.75;font-size:12px">Member ID: ${escHtml(memberId.slice(-8).toUpperCase())}</span>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="main-content">

      <!-- Notice -->
      <div class="notice">
        <i class="fa-solid fa-circle-info"></i>
        <span>You are securely signed in. Your session will remain active while you are using the portal.</span>
      </div>

      <!-- Quick Actions -->
      <div class="section-title"><i class="fa-solid fa-bolt"></i> Quick Actions</div>
      <div class="cards-grid">
        <div class="dash-card" onclick="comingSoon('Find a Provider')">
          <div class="card-icon ic-blue"><i class="fa-solid fa-location-dot"></i></div>
          <h3>Find a Provider</h3>
          <p>Search for in-network dentists near you.</p>
        </div>
        <div class="dash-card" onclick="comingSoon('View Claims')">
          <div class="card-icon ic-purple"><i class="fa-solid fa-file-invoice-dollar"></i></div>
          <h3>View Claims</h3>
          <p>Review your claim history and status.</p>
        </div>
        <div class="dash-card" onclick="comingSoon('Benefits Summary')">
          <div class="card-icon ic-green"><i class="fa-solid fa-star"></i></div>
          <h3>Benefits Summary</h3>
          <p>See what's covered under your dental plan.</p>
        </div>
        <div class="dash-card" onclick="comingSoon('Member ID Card')">
          <div class="card-icon ic-amber"><i class="fa-solid fa-id-card"></i></div>
          <h3>Member ID Card</h3>
          <p>Download or print your digital ID card.</p>
        </div>
        <div class="dash-card" onclick="comingSoon('Prior Authorization')">
          <div class="card-icon ic-blue"><i class="fa-solid fa-clipboard-check"></i></div>
          <h3>Prior Authorization</h3>
          <p>Submit and track authorization requests.</p>
        </div>
        <div class="dash-card" onclick="comingSoon('Explanation of Benefits')">
          <div class="card-icon ic-purple"><i class="fa-solid fa-file-lines"></i></div>
          <h3>Explanation of Benefits</h3>
          <p>View and download your EOB documents.</p>
        </div>
        <div class="dash-card" onclick="comingSoon('Preventive Care')">
          <div class="card-icon ic-green"><i class="fa-solid fa-tooth"></i></div>
          <h3>Preventive Care</h3>
          <p>Track cleanings, X-rays, and check-ups.</p>
        </div>
        <div class="dash-card" onclick="comingSoon('Contact Support')">
          <div class="card-icon ic-amber"><i class="fa-solid fa-headset"></i></div>
          <h3>Contact Support</h3>
          <p>Reach our member services team.</p>
        </div>
      </div>

      <!-- Profile section -->
      <div class="section-title"><i class="fa-solid fa-circle-user"></i> Account Information</div>
      <div class="profile-card">
        <div class="profile-row">
          <div class="profile-field">
            <label>Full Name</label>
            <span>${escHtml(displayName)}</span>
          </div>
          <div class="profile-field">
            <label>Email Address</label>
            <span>${escHtml(email)}</span>
          </div>
          <div class="profile-field">
            <label>Member ID</label>
            <span>${escHtml(memberId.slice(-12).toUpperCase())}</span>
          </div>
          <div class="profile-field">
            <label>Account Status</label>
            <span style="color:#166534;font-weight:700"><i class="fa-solid fa-circle-check" style="color:#22c55e"></i> Active</span>
          </div>
        </div>
      </div>

    </div><!-- /main-content -->
  `;
})();

/* ── Helpers ─────────────────────────────────────────────────── */
function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function doSignOut(){
  if(!confirm('Are you sure you want to sign out?')) return;
  LDToken.clear();
  sessionStorage.clear();
  location.replace('signin.html');
}

function comingSoon(feature){
  alert(feature+' — this feature is coming soon.');
}
</script>
</body></html>
