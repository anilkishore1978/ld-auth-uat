<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LIBERTY Dental Plan Member Portal - Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}html{font-size:16px}body{font-family:Roboto,sans-serif;background:#edf1f8;min-height:100vh;color:#1a2340}
a{color:#3352a3;text-decoration:none}a:hover{text-decoration:underline}
.topbar{background:#3352a3;color:#fff;padding:5px 0}.tb-in{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:flex-end;gap:12px;font-size:13px}
.tb-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;border-radius:3px;width:24px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.site-header{background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.09);position:sticky;top:0;z-index:10}
.nav-in{max-width:1280px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}.logo-img{height:48px;display:block}.nav-right{display:flex;align-items:center;gap:8px}
.btn-emg{background:none;border:2px solid #3352a3;color:#3352a3;border-radius:4px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer}
.main{max-width:1280px;margin:0 auto;padding:44px 20px 60px;display:grid;grid-template-columns:1fr 440px;gap:56px;align-items:start}@media(max-width:960px){.main{grid-template-columns:1fr;gap:24px}}
.hero-title{font-family:Nunito,sans-serif;font-size:clamp(32px,4vw,50px);font-weight:900;color:#1a2340;line-height:1.12;margin-bottom:14px}.hero-acc{color:#602D86}
.hero-sub{font-size:15px;color:#4a5568;line-height:1.85;max-width:520px;margin-bottom:24px}
.acard{background:#fff;border-radius:10px;box-shadow:0 4px 28px rgba(51,82,163,.12);overflow:hidden}
.acard-head{background:#3352a3;color:#fff;padding:16px 22px;text-align:center;font-size:17px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:8px}
.acard-body{padding:24px 24px 20px}
.fg{margin-bottom:16px}.fg label{display:block;font-size:13px;font-weight:700;color:#333;margin-bottom:5px}
.fg input{width:100%;padding:11px 13px;border:1px solid #ccc;border-radius:4px;font-size:15px;color:#333;background:#fff;transition:border .15s,box-shadow .15s;font-family:inherit;letter-spacing:.15em;text-align:center}
.fg input:focus{outline:none;border-color:#3352a3;box-shadow:0 0 0 3px rgba(51,82,163,.1)}
.btn-prim{width:100%;border-radius:4px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;background:#3352a3;color:#fff;border:none;transition:opacity .15s}
.btn-prim:hover{opacity:.9}.btn-prim:disabled{background:#a3b4e0;cursor:not-allowed}
.m-err{background:#fff3f3;border:1px solid #fcc;border-radius:4px;color:#721c24;padding:10px 12px;font-size:13px;margin-bottom:14px;line-height:1.5}
.m-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;color:#1e40af;padding:14px 16px;font-size:14px;line-height:1.6;text-align:center}
.otp-hint{text-align:center;font-size:14px;color:#4a5568;margin-bottom:20px;line-height:1.7}
.otp-target{font-weight:700;color:#3352a3;display:block}
.back-link{text-align:center;margin-top:14px;font-size:13px}
.footer{background:#1a2849;color:#8895b5;margin-top:auto}.fi{max-width:1280px;margin:0 auto;padding:28px 20px;font-size:12px}
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head><body>

<div class="topbar"><div class="tb-in"><span style="opacity:.8">Text Size</span>
<button class="tb-btn" onclick="changeFont(-1)">-</button>
<button class="tb-btn" onclick="changeFont(0)">&#8635;</button>
<button class="tb-btn" onclick="changeFont(1)">+</button>
</div></div>

<header class="site-header"><div class="nav-in">
<a href="index.html"><img class="logo-img" src="https://memberportal-blob.libertydentalplan.com/C-Stacked-Horizontal.svg" alt="LIBERTY Dental Plan"></a>
<div class="nav-right">
  <button class="btn-emg" onclick="window.open('https://www.teledentistry.com/insurance/liberty','_blank','noopener')">
    <i class="fa-solid fa-tooth"></i> Dental Emergency
  </button>
</div>
</div></header>

<main class="main">
  <section>
    <h1 class="hero-title">Welcome to <span class="hero-acc">My Compass</span></h1>
    <p class="hero-sub">Your security is our priority. Please verify your identity to continue.</p>
  </section>

  <section class="acard">
    <div class="acard-head"><i class="fa-solid fa-envelope-circle-check"></i> Verify Your Identity</div>
    <div class="acard-body" id="cbRoot">
      <div class="m-info">Please wait while we complete your sign-in…</div>
    </div>
  </section>
</main>

<footer class="footer"><div class="fi">© LIBERTY Dental Plan. All rights reserved.</div></footer>

<script src="./ld-config.js"></script>
<script src="./ld-native-auth.js"></script>
<script>function changeFont(d){const r=document.documentElement,c=parseFloat(getComputedStyle(r).fontSize)||16;r.style.fontSize=d===0?'16px':Math.min(20,Math.max(14,c+d))+'px';}</script>
<script>
(function(){
  const params=new URLSearchParams(location.search);
  const flow=params.get('flow');
  const root=document.getElementById('cbRoot');

  /* ── OTP verification flow (sign-in with OOB challenge) ─────── */
  if(flow==='signin-otp'){
    const pending=JSON.parse(sessionStorage.getItem('ld_signin_pending')||'null');
    if(!pending){
      root.innerHTML='<div class="m-err">No pending sign-in session found. <a href="signin.html">Return to Sign In</a></div>';
      return;
    }
    root.innerHTML=`
      <p class="otp-hint">
        We sent a <strong>${pending.len}-digit code</strong> to<br>
        <span class="otp-target">${pending.target}</span>
      </p>
      <div id="otpErr" class="m-err" style="display:none"></div>
      <div class="fg">
        <label for="otp">Verification Code</label>
        <input id="otp" type="text" inputmode="numeric" maxlength="${pending.len}"
               autocomplete="one-time-code" placeholder="${'•'.repeat(pending.len)}" autofocus>
      </div>
      <button id="verify" class="btn-prim">
        <span id="vwork" class="spin" style="display:none"></span>
        Verify &amp; Sign In
      </button>
      <div class="back-link"><a href="signin.html">← Back to Sign In</a></div>
    `;

    document.getElementById('verify').addEventListener('click', async()=>{
      const otp=document.getElementById('otp').value.trim();
      const errBox=document.getElementById('otpErr');
      errBox.style.display='none';
      if(otp.length<pending.len){errBox.style.display='block';errBox.textContent='Please enter the full '+pending.len+'-digit code.';return;}
      document.getElementById('verify').disabled=true;
      document.getElementById('vwork').style.display='inline-block';
      try{
        const tokens=await LDAuth.signInSubmitMfaOtp(pending.ct,otp);
        LDToken.store({
          idToken:    tokens.id_token||tokens.idtoken,
          accessToken:tokens.access_token||tokens.accesstoken,
          claims:     LDAuth.jwtDecode(tokens.id_token||tokens.idtoken)
        });
        sessionStorage.removeItem('ld_signin_pending');
        location.href='dashboard.html'; // ← redirect to dashboard, NOT index.html
      }catch(e){
        errBox.style.display='block';errBox.textContent=LDAuth.mapError(e);
        document.getElementById('verify').disabled=false;
        document.getElementById('vwork').style.display='none';
      }
    });

    document.getElementById('otp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('verify').click();});
    return;
  }

  /* ── Default: check session and redirect ────────────────────── */
  const sess=LDToken.get();
  if(!sess||!sess.idToken){
    root.innerHTML='<div class="m-info">No active session found. Redirecting to sign in…</div>';
    setTimeout(()=>location.href='signin.html',900);
    return;
  }
  // Already authenticated — go to dashboard
  location.href='dashboard.html';
})();
</script>
</body></html>
