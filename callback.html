<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIBERTY Dental Plan's Member Portal - Redirecting...</title>
  <link href="https://memberportal-blob.libertydentalplan.com/bootstrap-overrides.css"
        type="text/css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://memberportal-blob.libertydentalplan.com/styles.css"
        type="text/css" rel="stylesheet" crossorigin="anonymous">
  <link rel="icon" href="https://memberportal-blob.libertydentalplan.com/favicon.ico">
  <style>
    body { display:flex; align-items:center; justify-content:center;
           min-height:100vh; background:#f8f9fa; }
    .redirect-box { text-align:center; padding:40px; }
    .redirect-box img { max-width:200px; margin-bottom:24px; }
    .spinner { width:40px; height:40px; border:4px solid #dee2e6; border-top-color:#0a6ab5;
               border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to{transform:rotate(360deg);} }
    .redirect-box p { color:#6c757d; font-size:15px; }
    .error-box { display:none; background:#fff3f3; border:1px solid #f5c6cb;
                 border-radius:8px; padding:20px; margin-top:20px; color:#721c24; }
  </style>
</head>
<body>
  <div class="redirect-box">
    <img src="https://memberportal-blob.libertydentalplan.com/C-Stacked-Horizontal.svg"
         alt="LIBERTY Dental Plan">
    <div class="spinner" id="spinner"></div>
    <p id="status-msg">Completing sign-in, please wait…</p>
    <div class="error-box" id="error-box">
      <p id="error-msg">Authentication could not be completed.</p>
      <a href="signin.html">Return to Sign In</a>
    </div>
  </div>

  <script src="js/ld-config.js"></script>
  <script src="js/ld-native-auth.js"></script>

  <script>
  /* ══════════════════════════════════════════════════════════════════════════
     CALLBACK PAGE
     Purpose: Post-authentication redirect handler.

     Tokens are stored in sessionStorage by the sign-in page BEFORE redirecting
     here. This page validates the stored tokens and forwards the user to the
     Liberty Dental application (LD_CONFIG.postAuthUrl).

     Why a separate callback page?
     - Provides a clean redirect target URI registered in the Entra External ID
       app registration (required even for Native Auth flows)
     - Allows any additional post-auth logic (user info enrichment, session
       setup, audit logging) before forwarding to the main application
     - URL: https://anilkishore1978.in/callback.html
  ══════════════════════════════════════════════════════════════════════════ */
  (function () {
    'use strict';

    function showError(msg) {
      document.getElementById('spinner').style.display   = 'none';
      document.getElementById('status-msg').style.display = 'none';
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      document.getElementById('error-msg').textContent = msg;
    }

    async function handleCallback() {
      // Check for error params in URL (e.g. user cancelled MFA)
      const params = new URLSearchParams(window.location.search);
      if (params.get('error')) {
        showError('Authentication was cancelled or failed: ' + (params.get('error_description') || params.get('error')));
        return;
      }

      // Verify tokens exist in sessionStorage (set by signin.html before redirect)
      const accessToken = LDToken.getAccess();
      if (!accessToken) {
        // No token — back to sign in
        window.location.href = LD_CONFIG.pages.signin + '?expired=true';
        return;
      }

      // Token is expired — attempt silent refresh before forwarding
      if (LDToken.isExpired()) {
        document.getElementById('status-msg').textContent = 'Refreshing your session…';
        const newToken = await LDAuth.getValidToken();
        if (!newToken) {
          window.location.href = LD_CONFIG.pages.signin + '?expired=true';
          return;
        }
      }

      // ── Optional: Decode ID token to log user info (UAT telemetry) ─────────
      try {
        const idToken = sessionStorage.getItem('ld_id_token');
        if (idToken) {
          const payload = JSON.parse(atob(idToken.split('.')[1]));
          console.info('[LD UAT] Authenticated user:', {
            sub:   payload.sub,
            name:  payload.name,
            email: payload.email || payload.preferred_username,
            iss:   payload.iss,
            aud:   payload.aud,
          });
        }
      } catch (_) { /* silent — UAT logging only */ }

      // ── Forward to the Liberty Dental application ─────────────────────────
      document.getElementById('status-msg').textContent = 'Sign-in successful! Redirecting…';

      /*
       * The access token needs to reach the Liberty Dental backend.
       * Options:
       *   A) Pass it as a URL fragment (not recommended — visible in browser history)
       *   B) Post it to a server-side session endpoint via fetch, then redirect
       *   C) Use postMessage to the parent application window (for embedded scenarios)
       *   D) Let the application call a /userinfo or /me endpoint using the token
       *      stored in sessionStorage (for SPA applications on the same origin)
       *
       * For UAT: Option D — the application reads the token from sessionStorage.
       * The redirect target must be same-origin OR the application must be
       * updated to read from sessionStorage after the redirect.
       */
      setTimeout(function () {
        window.location.href = LD_CONFIG.postAuthUrl;
      }, 800);
    }

    handleCallback().catch(function (err) {
      console.error('[LD UAT] Callback error:', err);
      showError('An unexpected error occurred during sign-in. Please try again.');
    });

  })();
  </script>
</body>
</html>
